name: Install Verification

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override test URL (blank = use QA_BASE_URL secret)"
        required: false
      skip_debounce:
        description: "Skip the 30-min debounce (for dev testing)"
        type: boolean
        default: false

concurrency:
  group: install-test
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # ── Debounce (30 min) — skipped for workflow_dispatch or skip_debounce=true ──
      - name: Debounce
        if: github.event_name == 'push' && inputs.skip_debounce != true
        run: |
          echo "Debouncing for 30 minutes — subsequent pushes will cancel this run."
          sleep 1800

      # ── Trigger QA Vercel project redeploy ──────────────────────────────
      - name: Trigger QA deployment
        run: curl -s -X POST "${{ secrets.QA_VERCEL_DEPLOY_HOOK }}"

      # ── Reset QA database (fresh install equivalent) ─────────────────────
      - name: Validate QA database URL
        env:
          QA_DATABASE_URL: ${{ secrets.QA_DATABASE_URL }}
          QA_DB_ENDPOINT: ${{ secrets.QA_DB_ENDPOINT }}
        run: |
          if [ -z "$QA_DATABASE_URL" ]; then
            echo "❌ QA_DATABASE_URL secret is not set. Refusing to reset an unknown database."
            exit 1
          fi
          if [ -z "$QA_DB_ENDPOINT" ]; then
            echo "❌ QA_DB_ENDPOINT secret is not set. Cannot verify target database identity."
            echo "   Set QA_DB_ENDPOINT to the Neon endpoint ID from your QA project (e.g. ep-cool-name-123456)."
            exit 1
          fi
          if ! echo "$QA_DATABASE_URL" | grep -qF "$QA_DB_ENDPOINT"; then
            echo "❌ QA_DATABASE_URL does not contain the expected QA endpoint ($QA_DB_ENDPOINT). Aborting reset."
            exit 1
          fi
          echo "✅ QA database endpoint verified"

      - name: Reset QA database
        env:
          DATABASE_URL: ${{ secrets.QA_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.QA_DIRECT_URL }}
          # Clean install: seed foundation data only (no products, no orders, no extra users)
          SEED_PRODUCT_MODE: none
          SEED_INCLUDE_SYNTHETIC: "false"
          SEED_INCLUDE_MERCH: "false"
          SEED_INCLUDE_USERS: "false"
        run: npx prisma migrate reset --force

      # ── Wait for QA deployment to be ready ───────────────────────────────
      - name: Wait for deployment
        run: |
          URL="${{ inputs.base_url || secrets.QA_BASE_URL }}"
          echo "Waiting for $URL to be ready..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Ready"
              exit 0
            fi
            echo "  attempt $i: $STATUS — retrying in 15s"
            sleep 15
          done
          echo "❌ Timed out waiting for deployment"
          exit 1

      # Browser verification runs nightly via qa-nightly.yml — not here.
