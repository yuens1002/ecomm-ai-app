name: Install Verification

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override test URL (blank = use QA_BASE_URL secret)"
        required: false
      skip_debounce:
        description: "Skip the 30-min debounce (for dev testing)"
        type: boolean
        default: false

concurrency:
  group: install-test
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # ── Debounce (30 min) — skipped for workflow_dispatch or skip_debounce=true ──
      - name: Debounce
        if: github.event_name == 'push' && inputs.skip_debounce != true
        run: |
          echo "Debouncing for 30 minutes — subsequent pushes will cancel this run."
          sleep 1800

      # ── Trigger QA Vercel project redeploy ──────────────────────────────
      - name: Trigger QA deployment
        run: curl -s -X POST "${{ secrets.QA_VERCEL_DEPLOY_HOOK }}"

      # ── Reset QA database (fresh install equivalent) ─────────────────────
      - name: Reset QA database
        env:
          DATABASE_URL: ${{ secrets.QA_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.QA_DIRECT_URL }}
        run: npx prisma migrate reset --force --skip-seed

      # ── Wait for QA deployment to be ready ───────────────────────────────
      - name: Wait for deployment
        run: |
          URL="${{ inputs.base_url || secrets.QA_BASE_URL }}"
          echo "Waiting for $URL to be ready..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Ready"
              exit 0
            fi
            echo "  attempt $i: $STATUS — retrying in 15s"
            sleep 15
          done
          echo "❌ Timed out waiting for deployment"
          exit 1

      # ── Run the QA agent ─────────────────────────────────────────────────
      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Run QA agent
        env:
          BASE_URL: ${{ inputs.base_url || secrets.QA_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QA_ADMIN_NAME: ${{ secrets.QA_ADMIN_NAME }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_STORE_NAME: ${{ secrets.QA_STORE_NAME }}
        run: node scripts/qa-agent.js

      # ── Open GitHub issue on any failure ─────────────────────────────────
      - name: Open GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## Install Verification Failed

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}

          Check the run log for the per-AC breakdown.

          Opened automatically by the Install Verification workflow."
          gh issue create \
            --title "Install verification failed — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --label "install-assurance,bug" \
            --body "$BODY"
