name: Nightly QA Verification

on:
  schedule:
    - cron: "0 6 * * *" # 6am UTC daily — previous day's pushes fully settled
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override test URL (blank = QA_BASE_URL secret)"
        required: false
      model:
        description: "Claude model override"
        default: "claude-haiku-4-5-20251001"

concurrency:
  group: qa-nightly
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Validate QA database URL
        env:
          QA_DATABASE_URL: ${{ secrets.QA_DATABASE_URL }}
          QA_DB_ENDPOINT: ${{ secrets.QA_DB_ENDPOINT }}
        run: |
          if [ -z "$QA_DATABASE_URL" ]; then
            echo "❌ QA_DATABASE_URL secret is not set. Refusing to reset an unknown database."
            exit 1
          fi
          if [ -z "$QA_DB_ENDPOINT" ]; then
            echo "❌ QA_DB_ENDPOINT secret is not set. Cannot verify target database identity."
            exit 1
          fi
          if ! echo "$QA_DATABASE_URL" | grep -qF "$QA_DB_ENDPOINT"; then
            echo "❌ QA_DATABASE_URL does not contain the expected QA endpoint ($QA_DB_ENDPOINT). Aborting reset."
            exit 1
          fi
          echo "✅ QA database endpoint verified"

      - name: Reset QA state
        env:
          DATABASE_URL: ${{ secrets.QA_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.QA_DIRECT_URL }}
        run: |
          npx prisma db execute --stdin <<'SQL'
          DELETE FROM "Order";
          DELETE FROM "SiteSettings" WHERE key = 'eula_accepted';
          DELETE FROM "User";
          SQL
          echo "✅ QA state reset (orders, EULA + users cleared)"

      - name: Run QA agent
        env:
          BASE_URL: ${{ inputs.base_url || secrets.QA_BASE_URL }}
          ANTHROPIC_BASE_URL: ${{ secrets.VERCEL_AI_GATEWAY_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.VERCEL_AI_GATEWAY_TOKEN }}
          QA_ADMIN_NAME: ${{ secrets.QA_ADMIN_NAME }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_STORE_NAME: ${{ secrets.QA_STORE_NAME }}
          QA_MODEL: ${{ inputs.model || 'claude-haiku-4-5-20251001' }}
          QA_TOKEN_BUDGET: "300000"
        run: node scripts/qa-agent.js

      - name: Open GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "QA verification failed — $(date -u '+%Y-%m-%d')" \
            --label "install-assurance,bug" \
            --body "## QA Verification Failed

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Commit: \`${{ github.sha }}\`

          Check the run log for the per-AC breakdown."
