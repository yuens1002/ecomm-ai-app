name: Spec Drift Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  spec-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            setup:
              - 'app/setup/**'
              - 'prisma/schema.prisma'
              - 'INSTALLATION.md'
              - 'app/admin/**'
            spec:
              - 'VERIFICATION.md'
            agent:
              - 'scripts/qa-agent.js'

      # Warn when setup-related files change without updating the spec
      - name: Post spec-drift comment
        if: steps.filter.outputs.setup == 'true' && steps.filter.outputs.spec == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## ⚠️ Spec Drift Detected',
              '',
              'This PR modifies setup-related files but does not update `VERIFICATION.md`.',
              '',
              '**Changed files that may affect the install flow:**',
              '- `app/setup/**`',
              '- `prisma/schema.prisma`',
              '- `INSTALLATION.md`',
              '- `app/admin/**`',
              '',
              'If these changes affect what a fresh install looks like, please update the relevant AC rows in [`VERIFICATION.md`](../blob/main/VERIFICATION.md).',
              '',
              'If this change does not affect the install flow, you can safely ignore this comment.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # Warn when the spec changes without updating the qa-agent test blocks
      - name: Post missing-test comment
        if: steps.filter.outputs.spec == 'true' && steps.filter.outputs.agent == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## ⚠️ VERIFICATION.md changed — qa-agent.js not updated',
              '',
              'This PR adds or modifies ACs in `VERIFICATION.md` but does not update `scripts/qa-agent.js`.',
              '',
              'The QA agent reads all ACs from `VERIFICATION.md` automatically. If the new or changed AC involves tricky interactions (scroll gates, redirect chains, session clears, non-obvious button targets), add an entry to the `AC_HINTS` map in `scripts/qa-agent.js` to guide the agent.',
              '',
              'If the AC is straightforward (navigate → assert text), no hint is needed — but please verify by running `npm run qa:teardown && npm run qa:install` locally before merging.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
